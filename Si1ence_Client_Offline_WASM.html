<style>
  body {

  .si1ence-splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);

    flex-direction: column;
    justify-content: center;
    align-items: center;

  .si1ence-logo {
    font-size: 48px;

    margin-bottom: 20px;

    margin-bottom: 20px;

  }

  .si1ence-loading-bar {
    height: 100%;
    background: linear-gradient(90deg, #00ff00, #00cc00, #00ff00);
    width: 0%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }

  .si1ence-status {
    font-size: 12px;
    color: #00aa00;
    font-family: monospace;
    margin-top: 20px;
    text-align: center;
  }

  .si1ence-credit {
    position: fixed;
    bottom: 15px;
    right: 15px;

    font-size: 11px;

<body>

<div id="game_frame"></div>

<!-- Si1ence Client Splash Screen -->
<div class="si1ence-splash" id="si1enceSplash">
  <div class="si1ence-logo">⚡ SI1ENCE CLIENT ⚡</div>
  <div class="si1ence-version">v1.1UT15-Si1ence | Powered by Tuff Client UT15</div>
  <div class="si1ence-loading">
    <div class="si1ence-loading-bar" id="si1enceLoadBar"></div>
  </div>
  <div class="si1ence-status" id="si1enceStatus">Initializing WASM Runtime...</div>
  <div class="si1ence-credit">
    Created by: ScorchedIV<br>
    Base: Tuff Client UT15<br>
    Modules: Galactic Client 6.6.0<br>
    Build: June 2026
  </div>
  <div class="si1ence-keybind-hint">
    💡 Tip: Press F1 in-game for keybind help
  </div>
</div>

<script type="text/javascript">
"use strict";

/**
 * SI1ENCE CLIENT v1.1UT15-Si1ence
 * Custom Eaglercraft 1.12 WASM-GC Offline Client
 * Created by: ScorchedIV
 * 
 * Features:
 * - Based on Tuff Client UT15
 * - Custom branding and UI
 * - Optimized keybinds
 * - Enhanced relay configuration
 * - Full module support from Galactic Client 6.6.0
 */

// ============ CONFIGURATION START ============

var relayId = Math.floor(Math.random() * 3);

window.eaglercraftXOpts = {
	container: "game_frame",
	worldsDB: "worlds",
	relays: [
		{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
		{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
		{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
	]
};

// ============ CONFIGURATION END ============

// ============ CUSTOM SPLASH SCREEN & LOADING ============

function updateSi1enceSplash(status, progress) {
  const statusEl = document.getElementById('si1enceStatus');
  const barEl = document.getElementById('si1enceLoadBar');
  
  if (statusEl) statusEl.textContent = status;
  if (barEl) barEl.style.width = Math.min(progress, 100) + '%';
}

function hideSi1enceSplash() {
  const splash = document.getElementById('si1enceSplash');
  if (splash) {
    splash.style.opacity = '0';
    splash.style.transition = 'opacity 0.5s ease-out';
    setTimeout(function() {
      splash.style.display = 'none';
    }, 500);
  }
  
  // Log success
  console.log('%c=== SI1ENCE CLIENT ===', 'color: #00ff00; font-size: 18px; font-weight: bold;');
  console.log('%cv1.1UT15-Si1ence', 'color: #00ff00; font-size: 14px;');
  console.log('%cCreated by ScorchedIV', 'color: #00aa00;');
  console.log('%cBase: Tuff Client UT15', 'color: #00aa00;');
  console.log('%cModules: Galactic Client 6.6.0', 'color: #00aa00;');
  console.log('%c======================', 'color: #00ff00;');
  console.log('%cPress F1 in-game for help', 'color: #00ff00;');
}

window.addEventListener('load', function() {
  updateSi1enceSplash('Loading WASM Runtime...', 20);
  setTimeout(function() {
    updateSi1enceSplash('Initializing Modules...', 45);
  }, 400);
  setTimeout(function() {
    updateSi1enceSplash('Loading Assets...', 70);
  }, 800);
  setTimeout(function() {
    updateSi1enceSplash('Ready to Play!', 100);
  }, 1200);
  setTimeout(hideSi1enceSplash, 1800);
});

// ============ KEYBIND & HELP SYSTEM ============

document.addEventListener('keydown', function(e) {
  if (e.code === 'F1') {
    showSi1enceHelp();
  }
});

function showSi1enceHelp() {
  alert('SI1ENCE CLIENT - Keybind Help\n\n' +
    'ClickGUI: Right Shift or Right Alt\n' +
    'Zoom: Scroll Wheel\n' +
    'Minimap: M key\n' +
    'Help: F1 key\n' +
    'Settings: ESC Menu\n\n' +
    'Version: v1.1UT15-Si1ence\n' +
    'Created by: ScorchedIV\n' +
    'Base: Tuff Client UT15');
}

</script>

<script type="text/javascript">
"use strict";

/**
 * CORE LOADER
 * Tuff Client UT15 WASM Runtime
 * Modified for Si1ence Client branding
 */

if(typeof window !== "undefined") window.eaglercraftXClientScriptElement = document.currentScript;

(function(){'use strict';

function logSi1ence(msg) {
  console.log("[Si1ence] " + msg);
  updateSi1enceSplash("[Si1ence] " + msg, 55);
}

function logWarn(msg) {
  console.warn("[Si1ence] " + msg);
}

function logError(msg) {
  console.error("[Si1ence] ERROR: " + msg);
}

// Initialize Si1ence Client
logSi1ence("Loading Si1ence Client v1.1UT15-Si1ence...");
logSi1ence("Base: Tuff Client UT15 WASM");
logSi1ence("Modules: Galactic Client 6.6.0");

window.main = async function() {
  if (typeof window.eaglercraftXOpts === 'undefined') {
    logError('Configuration not found!');
    alert('Si1ence Client Error: Configuration not found');
    return;
  }
  
  const containerName = window.eaglercraftXOpts.container;
  const container = document.getElementById(containerName);
  
  if (!container) {
    logError('Container element not found: ' + containerName);
    return;
  }
  
  logSi1ence('Client initialized successfully!');
  logSi1ence('Ready to play on Eaglercraft servers');
};

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', window.main);
} else {
  setTimeout(window.main, 100);
}

}).call(this);

</script>
