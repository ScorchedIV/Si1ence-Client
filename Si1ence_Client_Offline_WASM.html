<div id="game_frame"></div>
<div class="loading-screen" id="loadingScreen">
  <div class="loading-text">Si1ence Client Loading...</div>
  <div class="loading-bar">
    <div class="loading-bar-fill" id="loadingBarFill"></div>
  </div>
  <div class="loading-text" id="loadingStatus" style="font-size: 14px; color: #aaa; margin-top: 20px;">Initializing WASM...</div>
</div>

<div class="keybind-info" id="keybindInfo">
  <strong>Si1ence Client Help</strong><br>
  ClickGUI: Right Shift or Right Alt<br>
  Zoom: Scroll Wheel<br>
  Minimap: M key<br>
  Settings: ESC Menu
</div>

<div class="version-info">
  Si1ence Client v1.1UT15-Galactic-6.6.0<br>
  Base: Tuff UT15 WASM<br>

<script type="text/javascript">
"use strict";

// ========== CONFIGURATION ==========

var relayId = Math.floor(Math.random() * 3);

window.eaglercraftXOpts = {
	container: "game_frame",
	worldsDB: "worlds",
	relays: [
		{ addr: "wss://relay.deev.is/", comment: "lax1dude relay #1", primary: relayId == 0 },
		{ addr: "wss://relay.lax1dude.net/", comment: "lax1dude relay #2", primary: relayId == 1 },
		{ addr: "wss://relay.shhnowisnottheti.me/", comment: "ayunami relay #1", primary: relayId == 2 }
	]
};

// ===================================

// Loading screen handling
function updateLoadingScreen(text, progress) {
  var status = document.getElementById('loadingStatus');
  var fill = document.getElementById('loadingBarFill');
  if (status) status.textContent = text;
  if (fill) fill.style.width = Math.min(progress, 100) + '%';
}

function hideLoadingScreen() {
  var screen = document.getElementById('loadingScreen');
  if (screen) {
    screen.style.display = 'none';
  }
  var keybindInfo = document.getElementById('keybindInfo');
  if (keybindInfo) {
    keybindInfo.style.display = 'block';
    setTimeout(function() {
      keybindInfo.style.display = 'none';
    }, 5000);
  }
}

// Update loading on page load
window.addEventListener('load', function() {
  updateLoadingScreen('Loading WASM modules...', 25);
  setTimeout(function() {
    updateLoadingScreen('Initializing client...', 50);
  }, 500);
  setTimeout(function() {
    updateLoadingScreen('Ready to play!', 100);
  }, 1000);
  setTimeout(hideLoadingScreen, 2000);
});

</script>

<script type="text/javascript">
"use strict";

if(typeof window !== "undefined") window.eaglercraftXClientScriptElement = document.currentScript;

(function(){'use strict';

// ========== CORE LOADER ==========

function logInfo(msg) {
  console.log("[Si1ence] " + msg);
  updateLoadingScreen("[Si1ence] " + msg, 40);
}

function logWarn(msg) {
  console.warn("[Si1ence] WARNING: " + msg);
}

function logError(msg) {
  console.error("[Si1ence] ERROR: " + msg);
}

// Base64 decoder utility
function createBase64Decoder() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
  const map = {};
  for (let i = 0; i < 64; i++) {
    map[chars.charCodeAt(i)] = i;
  }
  map[45] = 62;
  map[95] = 63;
  
  return function(str, offset) {
    offset = offset || 0;
    const remaining = str.length - offset;
    if (remaining % 4 !== 0) {
      throw new Error('Invalid base64 string length');
    }
    
    const out = new Uint8Array((remaining / 4) * 3);
    let outIdx = 0;
    
    for (let i = offset; i < str.length; i += 4) {
      const b0 = map[str.charCodeAt(i)];
      const b1 = map[str.charCodeAt(i + 1)];
      const b2 = map[str.charCodeAt(i + 2)];
      const b3 = map[str.charCodeAt(i + 3)];
      
      const v = (b0 << 18) | (b1 << 12) | (b2 << 6) | b3;
      
      out[outIdx++] = (v >> 16) & 0xff;
      out[outIdx++] = (v >> 8) & 0xff;
      out[outIdx++] = v & 0xff;
    }
    
    return out;
  };
}

const decodeBase64 = createBase64Decoder();

// Asset loading
function preloadImage(url) {
  return new Promise(function(resolve) {
    const img = new Image();
    img.addEventListener('load', resolve);
    img.addEventListener('error', function() {
      logWarn('Failed to preload image: ' + url);
      resolve();
    });
    img.src = url;
    setTimeout(resolve, 50);
  });
}

// Main initialization
window.main = async function() {
  if (typeof window.eaglercraftXOpts === 'undefined') {
    logError('window.eaglercraftXOpts is not defined!');
    alert('Si1ence Client: Configuration error!');
    return;
  }
  
  logInfo('Starting Si1ence Client v1.1UT15-Galactic-6.6.0');
  logInfo('Base: Tuff Client UT15 WASM');
  logInfo('Modules: Galactic Client 6.6.0');
  
  const containerName = window.eaglercraftXOpts.container;
  const container = document.getElementById(containerName);
  
  if (!container) {
    logError('Container element "' + containerName + '" not found!');
    alert('Si1ence Client: Container error!');
    return;
  }
  
  logInfo('Container found: ' + containerName);
  logInfo('Ready for game launch!');
  
  // Initialize keybinds info
  document.addEventListener('keydown', function(e) {
    if (e.code === 'F1') {
      var keybindInfo = document.getElementById('keybindInfo');
      if (keybindInfo) {
        keybindInfo.style.display = keybindInfo.style.display === 'none' ? 'block' : 'none';
      }
    }
  });
  
  logInfo('Si1ence Client ready!');
};

// Alternative initialization methods
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', window.main);
} else {
  setTimeout(window.main, 100);
}

}).call(this);

</script>
